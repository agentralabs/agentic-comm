<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1400 360" role="img" aria-label="AgenticComm GitHub hero pane (Agentra)">
  <defs>
    <pattern id="grid" width="20" height="20" patternUnits="userSpaceOnUse">
      <circle cx="2" cy="2" r="1" fill="#b8b6ae"/>
    </pattern>
  </defs>
  <rect width="1400" height="360" fill="#f2f1ea"/>
  <rect width="1400" height="360" fill="url(#grid)"/>
  <rect x="20" y="20" width="1360" height="320" fill="none" stroke="#111111" stroke-width="2"/>

  <line x1="20" y1="62" x2="1380" y2="62" stroke="#111111" stroke-width="2"/>
  <text x="40" y="48" font-family="'JetBrains Mono', monospace" font-size="14" fill="#5f5c53" letter-spacing="2"> // AGENTRA_LABS: MODULE_HERO</text>
  <rect x="1318" y="36" width="8" height="8" fill="#ea580c"/>
  <text x="1336" y="48" font-family="'JetBrains Mono', monospace" font-size="12" fill="#5f5c53" letter-spacing="2">001</text>

  <rect x="46" y="92" width="232" height="232" fill="none" stroke="#111111" stroke-width="2"/>
  <rect x="46" y="92" width="232" height="38" fill="#111111"/>
  <text x="62" y="116" font-family="'JetBrains Mono', monospace" font-size="11" fill="#f2f1ea" letter-spacing="2">COMM.CHANNEL_GRAPH</text>

  <!-- Channel nodes -->
  <circle cx="110" cy="175" r="10" fill="none" stroke="#111111" stroke-width="3"/>
  <text x="100" y="155" font-family="'JetBrains Mono', monospace" font-size="8" fill="#5f5c53">A</text>
  <circle cx="220" cy="175" r="10" fill="none" stroke="#ea580c" stroke-width="3"/>
  <text x="210" y="155" font-family="'JetBrains Mono', monospace" font-size="8" fill="#5f5c53">B</text>
  <circle cx="165" cy="255" r="10" fill="none" stroke="#111111" stroke-width="3"/>
  <text x="155" y="280" font-family="'JetBrains Mono', monospace" font-size="8" fill="#5f5c53">C</text>
  <circle cx="110" cy="255" r="10" fill="none" stroke="#111111" stroke-width="3"/>
  <text x="100" y="280" font-family="'JetBrains Mono', monospace" font-size="8" fill="#5f5c53">D</text>

  <!-- Message arrows -->
  <line x1="120" y1="175" x2="208" y2="175" stroke="#111111" stroke-width="2"/>
  <polygon points="206,170 216,175 206,180" fill="#111111"/>
  <line x1="115" y1="185" x2="158" y2="245" stroke="#ea580c" stroke-width="2" stroke-dasharray="6 3"/>
  <polygon points="153,240 160,250 148,248" fill="#ea580c"/>
  <line x1="220" y1="185" x2="175" y2="245" stroke="#111111" stroke-width="2"/>
  <polygon points="180,240 172,250 170,242" fill="#111111"/>

  <!-- Message label -->
  <rect x="140" y="195" width="44" height="16" fill="#111111"/>
  <text x="145" y="206" font-family="'JetBrains Mono', monospace" font-size="8" fill="#ea580c">msg</text>

  <text x="324" y="136" font-family="'JetBrains Mono', monospace" font-size="54" fill="#111111" font-weight="700" letter-spacing="1">AGENTICCOMM</text>
  <text x="324" y="172" font-family="'JetBrains Mono', monospace" font-size="18" fill="#ea580c" font-weight="700" letter-spacing="2">AGENT COMMUNICATION FOR AI SYSTEMS</text>
  <text x="324" y="210" font-family="'JetBrains Mono', monospace" font-size="16" fill="#5f5c53">
    Channels, messaging, pub/sub, and structured communication.
  </text>
  <text x="324" y="234" font-family="'JetBrains Mono', monospace" font-size="16" fill="#5f5c53">
    One portable .acomm file. Rust core. MCP-native. Any AI agent.
  </text>

  <rect x="324" y="258" width="154" height="34" fill="#111111"/>
  <text x="344" y="280" font-family="'JetBrains Mono', monospace" font-size="12" fill="#f2f1ea" letter-spacing="2">MCP-NATIVE</text>
  <rect x="488" y="258" width="154" height="34" fill="#111111"/>
  <text x="502" y="280" font-family="'JetBrains Mono', monospace" font-size="12" fill="#f2f1ea" letter-spacing="2">AGENTRA LABS</text>
  <rect x="652" y="258" width="118" height="34" fill="#ea580c"/>
  <text x="672" y="280" font-family="'JetBrains Mono', monospace" font-size="12" fill="#f2f1ea" letter-spacing="2">.ACOMM</text>
